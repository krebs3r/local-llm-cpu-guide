    const p = new URLSearchParams(window.location.search);
    return p.get("compare") ? "compare" : "platform";
  });
  const [platOpen, setPlatOpen] = useState({});
  const [filter, setFilter]     = useState("Alle");
  const [genFilter, setGenFilter] = useState("Alle");
  const [expanded, setExpanded] = useState(null);
  const [cpuTab, setCpuTab]     = useState({});
  const [lang, setLang]         = useState("de");
  const [compareList, setCompareList] = useState(()=>{
    const p = new URLSearchParams(window.location.search);
    const raw = p.get("compare");
    if (!raw) return [];
    return raw.split(",").map(m=>decodeURIComponent(m)).filter(m=>cpus.find(c=>c.model===m));
  });
  const [copied, setCopied]     = useState(false);
  const compareTableRef         = useRef(null);

  const togglePlat = p => setPlatOpen(prev => ({...prev,[p]:!prev[p]}));
  const getTab = m => cpuTab[m]||"specs";
  const setTab = (m,t) => setCpuTab(prev=>({...prev,[m]:t}));
  const toggleCompare = m => setCompareList(prev=>
    prev.includes(m) ? prev.filter(x=>x!==m) : prev.length<4 ? [...prev,m] : prev
  );

  useEffect(()=>{
    const url = new URL(window.location.href);
    if (compareList.length>0) {
      url.searchParams.set("compare", compareList.map(m=>encodeURIComponent(m)).join(","));
    } else {
      url.searchParams.delete("compare");
    }
    window.history.replaceState({}, "", url);
  }, [compareList]);

  const shareCompare = () => {
    navigator.clipboard.writeText(window.location.href).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    });
  };

  const exportPng = () => {
    if (!compareTableRef.current) return;
    const el = compareTableRef.current;

    // Clone off-screen so we can freely modify styles for html2canvas
    const clone = el.cloneNode(true);
    clone.style.position  = "fixed";
    clone.style.top       = "0";
    clone.style.left      = "-9999px";
    clone.style.overflow  = "visible";
    clone.style.width     = "820px";
    clone.style.minWidth  = "820px";
    document.body.appendChild(clone);
    const cloneInner = clone.querySelector("div");
    if (cloneInner) cloneInner.style.overflow = "visible";

    // Badges im Export: Hintergrund entfernen, nur Text
    clone.querySelectorAll(".compare-badge").forEach(b => {
      b.style.background = "none";
      b.style.padding    = "0";
      b.style.fontSize   = "10px";
      b.style.color      = "#8b949e";
    });

    html2canvas(clone, {
      backgroundColor: "#161b22",
      scale: 1.5,
      useCORS: true,
      logging: false,
    }).then(canvas=>{
      document.body.removeChild(clone);
      // Wasserzeichen – zentriert, diagonal
      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0); // Transform von html2canvas zurücksetzen
      const wm = "krebs3r.github.io/local-llm-cpu-guide";
      const fontSize = Math.max(20, Math.round(Math.min(canvas.width, canvas.height) * 0.03));
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(-Math.PI / 8);
      ctx.font = `bold ${fontSize}px monospace`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,255,255,0.13)";
      ctx.fillText(wm, 0, 0);
      ctx.restore();
      const names = compareList
        .map(m=>m.replace(/\s+/g,"-").replace(/[^a-zA-Z0-9\-]/g,""))
        .join("_vs_");
      const link = document.createElement("a");
      link.download = "cpu-compare_"+names+".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }).catch(()=>{
      document.body.removeChild(clone);
    });
  };

  const gens = useMemo(()=>{
    const src = filter==="Alle" ? cpus : cpus.filter(c=>c.platform===filter);
    return ["Alle",...new Set(src.map(c=>c.gen))];

  const filteredCpus = useMemo(()=>{
    let list = filter==="Alle" ? cpus : cpus.filter(c=>c.platform===filter);

                                <div><span className="text-[#6e7681]">{T[lang].tripleGpuLabel} </span><span className={cs.tripleGpu.includes("❌")?"text-red-400":cs.tripleGpu.includes("⚠")?"text-yellow-400":"text-emerald-400"}>{cs.tripleGpu}</span></div>

                              <div className="text-[#6e7681] leading-relaxed">{lang==="en"?(PLATFORM_EN[p]?.chipsets[idx]?.note||cs.note):cs.note}</div>

                  </tr></thead>
                  <tbody>
                    {[
                      {p:"LGA1200",vendor:"Intel",lanes:"16–20",gen:"3.0/4.0",d:"x8/x8 (Z490/Z590)",t:"❌"},
                      {p:"LGA1700",vendor:"Intel",lanes:"20",   gen:"5.0/4.0",d:"x8/x8 (Z690/Z790)",t:"❌"},
                      {p:"LGA1851",vendor:"Intel",lanes:"20",   gen:"5.0",    d:"x8/x8 (Z890)",     t:"❌"},

                      {p:"TRX40",  vendor:"AMD HEDT",lanes:"72",gen:"4.0",   d:"x16/x16 ✓",        t:"x16/x16/x16 ✓"},
                      {p:"TRX50",  vendor:"AMD HEDT",lanes:"92",gen:"5.0",   d:"x16/x16 ✓",        t:"x16/x16/x16 ✓"},

                          <td className="px-3 py-2 text-[#c9d1d9]">{lanes}</td>
                          <td className="px-3 py-2 text-[#c9d1d9]">{gen}</td>

                          <td className={`px-3 py-2 ${t.includes("❌")?"text-red-400":t.includes("✓")?"text-emerald-400":"text-yellow-400"}`}>{t}</td>

              </div>
            </div>
          </div>

        {view==="cpu" && (
          <div>
            {/* Intel / AMD filter row */}

              <div className="text-[10px] text-[#58a6ff] font-semibold uppercase tracking-wider mb-1 ml-1">{T[lang].intelLabel}</div>
              <div className="flex flex-wrap gap-1.5 mb-2">
                {["Alle",...intelPlats].map(p=>(
                  <button key={p} onClick={()=>{setFilter(p);setGenFilter("Alle");setExpanded(null);}}
                    className={`px-3 py-1 rounded-full text-xs font-medium transition-all ${filter===p?"bg-[#1f6feb] text-[#e6edf3]":"bg-[#21262d] text-[#8b949e] hover:bg-[#30363d]"}`}>
                    {p==="Alle"?T[lang].allFilter:PLATFORM_META[p]?.label||p}
                  </button>
                ))}
              </div>
              <div className="text-[10px] text-red-400 font-semibold uppercase tracking-wider mb-1 ml-1">{T[lang].amdLabel}</div>
              <div className="flex flex-wrap gap-1.5 mb-2">
                {amdPlats.map(p=>(
                  <button key={p} onClick={()=>{setFilter(p);setGenFilter("Alle");setExpanded(null);}}

            <div className="flex flex-wrap gap-x-2 gap-y-1 mb-3 text-[10px] items-center">
              {Object.entries(PL).map(([k,v])=>{const c=PC[k]; return(
                <span key={k} className={`${c.bg} ${c.text} px-1.5 py-0.5 rounded font-medium`}>{v[lang]} {v.range}</span>
              )})}
              <span className="ml-auto text-[#3d444d] italic">{T[lang].priceLegend}</span>
            </div>

            {PLATFORM_ORDER.map(platform=>{
              const items = filteredCpus.filter(c=>c.platform===platform);
              if(!items.length) return null;
              const meta = PLATFORM_META[platform];
              const byGen = {};
              items.forEach(c=>{ if(!byGen[c.gen]) byGen[c.gen]=[]; byGen[c.gen].push(c); });
              const isIntel = intelPlats.includes(platform);

                <div key={platform} className="mb-5">
                  <div className="flex items-center gap-2 mb-1">
                    <span className={`text-xs font-bold px-2 py-0.5 rounded ${meta.style}`}>{meta.label}</span>

                    <span className="text-[#6e7681] text-[11px] truncate">{meta.desc}</span>
                  </div>
                  <div className="text-[10px] text-[#484f58] mb-2 ml-1">{lang==="en"?(PLATFORM_EN[platform]?.note||meta.note):meta.note}</div>

                    <div key={gen} className="mb-3">
                      <div className="text-[10px] font-semibold text-[#484f58] uppercase tracking-wider ml-1 mb-1.5">{gen}</div>

                        {genCpus.map(cpu=>{
                          const pc=PC[cpu.priceRating]; const llm=LC[cpu.llmRating];
                          const isOpen=expanded===cpu.model; const curTab=getTab(cpu.model);
                          return (
                            <div key={cpu.model} className="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden">
                              <button className="w-full text-left px-3 py-2.5 flex items-center gap-2.5 hover:bg-[#21262d] transition-colors"

                                  <div className="text-base font-bold leading-none text-[#e6edf3]">{cpu.cores}</div>
                                  <div className="text-[9px] text-[#6e7681]">{cpu.coreDetail||T[lang].cores}</div>
                                </div>
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-1.5">
                                    <span className="font-semibold text-[#e6edf3] text-sm">{cpu.model}</span>

                                  <div className="text-[11px] text-[#6e7681]">{cpu.arch} · {cpu.base}–{cpu.boost} GHz · {cpu.tdp}W</div>
                                </div>
                                <span className={`${llm.text} text-[10px] font-medium hidden md:block whitespace-nowrap`}>{llm.label[lang]}</span>
                                <div className={`${pc.bg} ${pc.text} px-2 py-1.5 rounded-lg text-right shrink-0 w-24`}>
                                  <div className="text-[11px] font-semibold whitespace-nowrap">{cpu.priceUsed}</div>
                                  <div className="text-[9px] opacity-70">{PL[cpu.priceRating][lang]}</div>
                                </div>
                                <button
                                  onClick={e=>{e.stopPropagation();toggleCompare(cpu.model);}}
                                  disabled={!compareList.includes(cpu.model)&&compareList.length>=4}
                                  title={compareList.includes(cpu.model)?"Aus Vergleich entfernen":compareList.length>=4?"Max. 4 CPUs":"Zum Vergleich hinzufügen"}
                                  className={`shrink-0 w-5 h-5 rounded text-[10px] font-bold transition-all border ${compareList.includes(cpu.model)?"bg-[#1f6feb] border-[#1f6feb] text-[#e6edf3]":compareList.length>=4?"bg-[#161b22] border-[#30363d] text-[#3d444d] cursor-not-allowed":"bg-[#21262d] border-[#30363d] text-[#6e7681] hover:text-[#c9d1d9] hover:border-[#484f58]"}`}>
                                  {compareList.includes(cpu.model)?"✓":"+"}
                                </button>
                                <span className={`text-[#484f58] text-xs shrink-0 transition-transform ${isOpen?"rotate-180":""}`}>▾</span>
                              </button>

                              {isOpen && (
                                <div className="border-t border-[#30363d]">
                                  <div className="flex border-b border-[#30363d]">
                                    {["specs","llm"].map(t=>(
                                      <button key={t} onClick={()=>setTab(cpu.model,t)}
                                        className={`flex-1 py-1.5 text-[11px] font-medium transition-colors ${curTab===t?"text-[#58a6ff] border-b-2 border-[#1f6feb] bg-[#21262d]":"text-[#6e7681] hover:text-[#c9d1d9]"}`}>
                                        {t==="specs"?T[lang].tabSpecs:T[lang].tabLlm}
                                      </button>
                                    ))}
                                  </div>
                                  {curTab==="specs" && (
                                    <div className="px-3 pb-3 pt-2.5 space-y-2">
                                      {CPU_LAUNCH[cpu.model] && (
                                        <div className="grid grid-cols-2 gap-2 text-xs">
                                          <div className="bg-[#21262d] rounded-lg p-2">
                                            <div className="text-[#6e7681] mb-0.5 text-[10px]">{lang==="de"?"UVP (Launch)":"MSRP (Launch)"}</div>
                                            <div className="font-bold text-[#e6edf3] text-[11px]">{CPU_LAUNCH[cpu.model].msrp}</div>
                                          </div>
                                          <div className="bg-[#21262d] rounded-lg p-2">
                                            <div className="text-[#6e7681] mb-0.5 text-[10px]">{lang==="de"?"Erschienen":"Released"}</div>
                                            <div className="font-bold text-[#e6edf3] text-[11px]">{CPU_LAUNCH[cpu.model].released}</div>
                                          </div>
                                        </div>
                                      )}
                                      <div className="grid grid-cols-2 gap-2 text-xs sm:grid-cols-4">
                                        {[
                                          {l:"Threads",v:cpu.threads},
                                          {l:"PCIe",v:cpu.pcie},
                                          {l:"RAM",v:cpu.ram},
                                          {l:"TDP",v:`${cpu.tdp}W`},
                                        ].map(({l,v})=>(
                                          <div key={l} className="bg-[#21262d] rounded-lg p-2">
                                            <div className="text-[#6e7681] mb-0.5 text-[10px]">{l}</div>
                                            <div className="font-bold text-[#e6edf3] text-[11px]">{v}</div>
                                          </div>
                                        ))}
                                      </div>
                                      <div className="bg-[#21262d] rounded-lg p-2.5 text-xs">
                                        <div className="text-[#6e7681] mb-1.5 text-[10px] uppercase tracking-wider font-semibold">Cinebench</div>
                                        <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-[11px]">
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R23 Single</span><span className="font-bold text-[#e6edf3]">{cpu.cbR23s??'–'}</span></div>
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R23 Multi</span><span className="font-bold text-[#e6edf3]">{cpu.cbR23m??'–'}</span></div>
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R24 Single</span><span className="font-bold text-[#e6edf3]">{cpu.cbR24s??'–'}</span></div>
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R24 Multi</span><span className="font-bold text-[#e6edf3]">{cpu.cbR24m??'–'}</span></div>
                                        </div>
                                      </div>
                                      {cpu.igpu && (
                                        <div className="bg-[#0a1929] border border-[#1c3a5e] rounded-lg p-2.5 text-xs">
                                          <div className="text-[#58a6ff] font-semibold mb-1 text-[10px] uppercase tracking-wider">{T[lang].igpuTitle}</div>
                                          <div className="text-[#a5d6ff] font-medium">{cpu.igpu}</div>
                                          <div className="text-[#58a6ff] text-[10px] mt-1">{T[lang].igpuNote}</div>
                                        </div>
                                      )}
                                    </div>

                                  {curTab==="llm" && (

                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>

            })}

                <div className="flex items-center gap-2">
                  <button onClick={shareCompare}
                    className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium border transition-all ${copied?"bg-emerald-900 border-emerald-700 text-emerald-300":"bg-[#21262d] border-[#30363d] text-[#8b949e] hover:border-[#58a6ff] hover:text-[#58a6ff]"}`}>
                    {copied ? (
                      <><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>{T[lang].shareCopied}</>

                      <><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M7.75 2a.75.75 0 0 1 .75.75V7h4.25a.75.75 0 0 1 0 1.5H8.5v4.25a.75.75 0 0 1-1.5 0V8.5H2.75a.75.75 0 0 1 0-1.5H7V2.75A.75.75 0 0 1 7.75 2ZM2.5 2.5h2.25a.75.75 0 0 0 0-1.5H2A1.5 1.5 0 0 0 .5 2.5v2.25a.75.75 0 0 0 1.5 0V2.5Zm11 0V4.75a.75.75 0 0 0 1.5 0V2A1.5 1.5 0 0 0 13.5.5h-2.25a.75.75 0 0 0 0 1.5H13.5Zm0 11h-2.25a.75.75 0 0 0 0 1.5H13.5A1.5 1.5 0 0 0 15 13.5v-2.25a.75.75 0 0 0-1.5 0V13.5ZM2.5 11.25a.75.75 0 0 0-1.5 0V13.5A1.5 1.5 0 0 0 2.5 15h2.25a.75.75 0 0 0 0-1.5H2.5v-2.25Z"/></svg>{T[lang].shareBtn}</>
                    )}

                  <button onClick={exportPng}
                    className="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium border bg-[#21262d] border-[#30363d] text-[#8b949e] hover:border-[#3fb950] hover:text-[#3fb950] transition-all">
                    <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.97a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.779a.749.749 0 1 1 1.06-1.06l1.97 1.97Z"/></svg>
                    {T[lang].exportBtn}
                  </button>
                  <button onClick={()=>setCompareList([])} className="text-xs text-[#6e7681] hover:text-red-400 transition-colors">{T[lang].compareClear}</button>
                </div>
              )}
            </div>
            {compareList.length===0 ? (
              <div className="bg-[#161b22] border border-[#30363d] rounded-xl p-8 text-center">
                <div className="text-[#6e7681] text-sm mb-3">{T[lang].compareEmpty}</div>
                <button onClick={()=>setView("cpu")} className="px-4 py-1.5 bg-[#21262d] hover:bg-[#30363d] text-[#c9d1d9] text-xs rounded-full transition-colors">
                  {T[lang].tabCpu} →
                </button>
              </div>
            ) : (()=>{
              const selCpus = compareList.map(m=>cpus.find(c=>c.model===m)).filter(Boolean);
              const rowDefs = [
                {i:0, numVal:null,          lower:false, val:c=>CPU_LAUNCH[c.model]?.released??'–'},
                {i:1, numVal:null,          lower:false, val:c=>CPU_LAUNCH[c.model]?.msrp??'–'},
                {i:2, numVal:null,          lower:false, val:c=>`${c.cores}/${c.threads}${c.coreDetail?" ("+c.coreDetail+")":""}`},
                {i:3, numVal:null,          lower:false, val:c=>c.base+"–"+c.boost+" GHz"},
                {i:4, numVal:c=>c.tdp,      lower:true,  val:c=>c.tdp+"W"},
                {i:5, numVal:null,          lower:false, val:c=>c.pcie},
                {i:6, numVal:null,          lower:false, val:c=>c.ram},
                {i:7, numVal:null,          lower:false, val:c=>c.priceUsed},
                {i:8, numVal:c=>c.cbR23s,  lower:false, val:c=>c.cbR23s??'–'},
                {i:9, numVal:c=>c.cbR23m,  lower:false, val:c=>c.cbR23m??'–'},
                {i:10,numVal:c=>c.cbR24s,  lower:false, val:c=>c.cbR24s??'–'},
                {i:11,numVal:c=>c.cbR24m,  lower:false, val:c=>c.cbR24m??'–'},
                {i:12,numVal:null,          lower:false, val:c=>LC[c.llmRating].label[lang]},
              ];
              return (
                <div ref={compareTableRef} className="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="border-b border-[#30363d]">
                          <th className="text-left px-3 py-2.5 text-[#6e7681] text-[10px] uppercase tracking-wider min-w-[110px] sticky left-0 bg-[#161b22] z-10">{T[lang].compareSpec}</th>
                          {selCpus.map(cpu=>{
                            const meta=PLATFORM_META[cpu.platform];
                            return (
                              <th key={cpu.model} className="px-3 pt-3 pb-2.5 text-left min-w-[155px] align-bottom">
                                <div className="flex items-end justify-between gap-1">
                                  <div className="flex flex-col gap-1 items-start">
                                    <span className={"compare-badge rounded font-bold "+meta.style} style={{display:"inline-block",padding:"4px 7px",fontSize:"9px",lineHeight:"1",whiteSpace:"nowrap"}}>{meta.label}</span>
                                    <div className="text-[#e6edf3] font-bold text-[12px] leading-snug">{cpu.model}</div>
                                  </div>
                                  <button onClick={()=>toggleCompare(cpu.model)} className="text-[#484f58] hover:text-red-400 text-xs shrink-0 mb-0.5 transition-colors">✕</button>
                                </div>
                              </th>
                            );
                          })}

                      </thead>
                      <tbody>
                        {rowDefs.map(({i,numVal,lower,val})=>{
                          const nums = numVal ? selCpus.map(c=>numVal(c)).filter(v=>v!=null) : [];
                          const best = nums.length ? (lower?Math.min(...nums):Math.max(...nums)) : null;
                          return (
                            <tr key={i} className="border-b border-[#30363d] hover:bg-[#21262d]">
                              <td className="px-3 py-2 text-[#6e7681] text-[10px] font-semibold uppercase tracking-wider sticky left-0 bg-[#161b22]">{T[lang].compareRows[i]}</td>
                              {selCpus.map(cpu=>{
                                const n = numVal ? numVal(cpu) : null;
                                const isBest = best!==null && n===best;
                                return (
                                  <td key={cpu.model} className={"px-3 py-2 "+(isBest?"text-emerald-400 font-bold":"text-[#c9d1d9]")}>
                                    {val(cpu)}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className="px-3 py-2 border-t border-[#30363d] text-[10px] text-[#484f58] text-center">{T[lang].compareMax}</div>
                </div>
              );
            })()}
          </div>
        )}

        {/* Recommendations */}
        <div className="bg-[#161b22] border border-[#30363d] rounded-xl p-3.5 mt-4">
          <div className="text-[#c9d1d9] font-semibold text-sm mb-2">{T[lang].recTitle}</div>
          <div className="space-y-1.5 text-xs text-[#8b949e]">
            {T[lang].recs.map(({i,l,c,r})=>(
              <div key={l} className="flex gap-2">
                <span className="shrink-0">{i}</span>
                <span className={`${c} font-medium whitespace-nowrap`}>{l}:</span>
                <span>{r}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="text-[10px] text-[#3d444d] mt-3 text-center">
          {T[lang].footer}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
