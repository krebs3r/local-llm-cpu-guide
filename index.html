function getCpuUrl(cpu) {
  const { model, platform } = cpu;
  // Intel – direkte ARK-Produktseiten
  if (["LGA1200","LGA1700","LGA1851","X299_Intel"].includes(platform)) {
    return INTEL_URLS[model] || null;
  }
  // AMD Consumer (AM4, AM5)
  if (platform === "AM4" || platform === "AM5") {
    const m = model.match(/(\d{4})/);
    if (m) {
      const series = Math.floor(parseInt(m[1]) / 1000) * 1000;
      const slug = "amd-" + model.toLowerCase().replace(/\s+/g, "-");
      return `https://www.amd.com/en/products/processors/desktops/ryzen/${series}-series/${slug}.html`;
    }
  }
  // AMD Threadripper (X399 = Gen1/2, TRX40 = Gen3, TRX50 = Gen7)
  if (platform === "X399" || platform === "TRX40" || platform === "TRX50") {
    const parts = model.split(" ");
    const num = parts[parts.length - 1];
    const m = num.match(/(\d{4})/);
    if (m) {
      const series = Math.floor(parseInt(m[1]) / 1000) * 1000;
      return `https://www.amd.com/en/products/processors/workstations/ryzen-threadripper/${series}-series/amd-ryzen-threadripper-${num.toLowerCase()}.html`;
    }
  }
  return null;
}

                                      <svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/></svg>
                                      {lang==="de"?"Produktseite":"Product Page"}
                                    </a>

                                  </div>
                                  {curTab==="specs" && (

                                            <div className="text-[#6e7681] mb-0.5 text-xs">{lang==="de"?"UVP (Launch)":"MSRP (Launch)"}</div>

                                            <div className="text-[#6e7681] mb-0.5 text-xs">{lang==="de"?"Erschienen":"Released"}</div>
                                            <div className="font-bold text-[#e6edf3] text-xs">{CPU_LAUNCH[cpu.model].released}</div>
                                          </div>
                                        </div>
                                      )}
                                      <div className="grid grid-cols-2 gap-2 text-xs sm:grid-cols-4">
                                        {[
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M5 1a2 2 0 0 0-2 2v1H1.75a.75.75 0 0 0 0 1.5H3v1.5H1.75a.75.75 0 0 0 0 1.5H3V9H1.75a.75.75 0 0 0 0 1.5H3V12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1.5h1.25a.75.75 0 0 0 0-1.5H13V8h1.25a.75.75 0 0 0 0-1.5H13V5.5h1.25a.75.75 0 0 0 0-1.5H13V3a2 2 0 0 0-2-2zm0 1.5h6a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5H5a.5.5 0 0 1-.5-.5V3a.5.5 0 0 1 .5-.5z"/></svg>, l:lang==="de"?"Kerne":"Cores", v:`${cpu.cores}${cpu.coreDetail?" ("+cpu.coreDetail+")":""}`},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M1.75 2h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5zm0 5h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5zm0 5h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1 0-1.5z"/></svg>, l:"Threads", v:cpu.threads},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M10.38 1.47a.75.75 0 0 1 .28 1.02L7.04 7.75H11a.75.75 0 0 1 .58 1.23l-6 7.5a.75.75 0 0 1-1.31-.65l1.5-5H2.75a.75.75 0 0 1-.57-1.23l7.5-9a.75.75 0 0 1 1.2.13Z"/></svg>, l:"GHz", v:`${cpu.base}–${cpu.boost}`},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 0 1 0 2.474l-5.026 5.026a1.75 1.75 0 0 1-2.474 0l-6.25-6.25A1.752 1.752 0 0 1 1 7.775Zm1.5 0c0 .066.026.13.073.177l6.25 6.25a.25.25 0 0 0 .354 0l5.025-5.025a.25.25 0 0 0 0-.354l-6.25-6.25a.25.25 0 0 0-.177-.073H2.75a.25.25 0 0 0-.25.25ZM6 5a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/></svg>, l:"Codename", v:cpu.arch.split("·")[0]},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M6.5 1.75v3.026a1.75 1.75 0 0 1-.167.743L3.533 10.5h8.934L9.667 5.519a1.75 1.75 0 0 1-.167-.743V1.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25Zm-2.25-.25A1.75 1.75 0 0 1 6 0h4a1.75 1.75 0 0 1 1.75 1.75v3.026a.25.25 0 0 0 .024.106l2.8 5.857a1.75 1.75 0 0 1-1.574 2.511H2.999a1.75 1.75 0 0 1-1.574-2.511l2.8-5.857a.25.25 0 0 0 .024-.106V1.75Z"/></svg>, l:"Prozess", v:cpu.arch.split("·")[1]},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M1.75 1h12.5c.966 0 1.75.784 1.75 1.75v4c0 .966-.784 1.75-1.75 1.75H1.75A1.75 1.75 0 0 1 0 6.75v-4C0 1.784.784 1 1.75 1ZM1.5 2.75v4c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25v-4a.25.25 0 0 0-.25-.25H1.75a.25.25 0 0 0-.25.25ZM0 11.75C0 10.784.784 10 1.75 10h12.5c.966 0 1.75.784 1.75 1.75v2.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25ZM1.5 12v2.25c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V12a.25.25 0 0 0-.25-.25H1.75a.25.25 0 0 0-.25.25Zm11.25 1a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm-8.5-5a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/></svg>, l:"PCIe", v:cpu.pcie},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M1 3.5C1 2.119 4.03 1 8 1s7 1.119 7 2.5v9c0 1.381-3.03 2.5-7 2.5s-7-1.119-7-2.5v-9ZM14.5 6.135C13.023 6.979 10.718 7.5 8 7.5s-5.023-.521-6.5-1.365V8.5C1.5 9.391 4.268 10.5 8 10.5s6.5-1.109 6.5-2ZM1.5 9.615V12.5c0 .891 2.768 2 6.5 2s6.5-1.109 6.5-2V9.615C13.023 10.459 10.718 11 8 11s-5.023-.541-6.5-1.385ZM8 2.5c-3.732 0-6.5 1.109-6.5 2s2.768 2 6.5 2 6.5-1.109 6.5-2-2.768-2-6.5-2Z"/></svg>, l:"RAM", v:cpu.ram},
                                          {i:<svg viewBox="0 0 16 16" width="9" height="9" fill="currentColor"><path d="M9.504.43a1.516 1.516 0 0 1 2.437 1.713L9.232 6H12a1 1 0 0 1 .78 1.631l-5.992 7a1.516 1.516 0 0 1-2.437-1.713L7.03 9H4a1 1 0 0 1-.78-1.631l5.992-7a1 1 0 0 1 .292-.939z"/></svg>, l:"TDP", v:`${cpu.tdp}W`},
                                        ].map(({i,l,v})=>(

                                            <div className="text-[#6e7681] mb-0.5 text-xs flex items-center gap-1">{i}{l}</div>

                                          </div>
                                        ))}
                                      </div>
                                      <div className="bg-white/5 backdrop-blur-sm rounded-lg p-3 text-xs">
                                        <div className="text-[#6e7681] mb-1.5 text-xs uppercase tracking-wider font-semibold">Cinebench</div>
                                        <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R23 Single</span><span className="font-bold text-[#e6edf3]">{cpu.cbR23s??'–'}</span></div>
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R23 Multi</span><span className="font-bold text-[#e6edf3]">{cpu.cbR23m??'–'}</span></div>
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R24 Single</span><span className="font-bold text-[#e6edf3]">{cpu.cbR24s??'–'}</span></div>
                                          <div className="flex justify-between"><span className="text-[#6e7681]">R24 Multi</span><span className="font-bold text-[#e6edf3]">{cpu.cbR24m??'–'}</span></div>
                                        </div>
                                      </div>
                                      {cpu.igpu && (
                                        <div className="bg-[#0a1929]/60 backdrop-blur-sm border border-[#58a6ff]/20 rounded-lg p-3 text-xs">
                                          <div className="text-[#58a6ff] font-semibold mb-1 text-xs uppercase tracking-wider">{T[lang].igpuTitle}</div>
                                          <div className="text-[#a5d6ff] font-medium">{cpu.igpu}</div>
                                          <div className="text-[#58a6ff] text-[10px] mt-1">{T[lang].igpuNote}</div>
                                        </div>

                                  )}
                                  {curTab==="llm" && (
                                    <div className="px-3 pb-3 pt-2.5">
                                      <div className={`inline-flex items-center gap-2 mb-2 px-2.5 py-1.5 rounded-full text-xs font-semibold bg-[#21262d] ${llm.text}`}>

                                      </div>
                                      <div className="bg-white/5 backdrop-blur-sm rounded-lg p-3 text-xs text-[#c9d1d9] leading-relaxed">{cpu.llmText}</div>
                                    </div>

                                </div>

                            </div>
                          );

                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {/* ══ COMPARE VIEW ══ */}
        {view==="compare" && (
          <div>
            <div className="flex items-center justify-between mb-3">
              <div className="text-sm font-semibold text-[#e6edf3]">{T[lang].compareTitle}</div>
              {compareList.length>0 && (
                <div className="flex items-center gap-2">
                  <button onClick={shareCompare}
                    className={`flex items-center gap-1.5 px-3 py-2 rounded-full text-xs font-medium border transition-all ${copied?"bg-emerald-900 border-emerald-700 text-emerald-300":"bg-[#21262d] border-[#30363d] text-[#8b949e] hover:border-[#58a6ff] hover:text-[#58a6ff]"}`}>
                    {copied ? (
                      <><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>{T[lang].shareCopied}</>
                    ) : (
                      <><svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M7.75 2a.75.75 0 0 1 .75.75V7h4.25a.75.75 0 0 1 0 1.5H8.5v4.25a.75.75 0 0 1-1.5 0V8.5H2.75a.75.75 0 0 1 0-1.5H7V2.75A.75.75 0 0 1 7.75 2ZM2.5 2.5h2.25a.75.75 0 0 0 0-1.5H2A1.5 1.5 0 0 0 .5 2.5v2.25a.75.75 0 0 0 1.5 0V2.5Zm11 0V4.75a.75.75 0 0 0 1.5 0V2A1.5 1.5 0 0 0 13.5.5h-2.25a.75.75 0 0 0 0 1.5H13.5Zm0 11h-2.25a.75.75 0 0 0 0 1.5H13.5A1.5 1.5 0 0 0 15 13.5v-2.25a.75.75 0 0 0-1.5 0V13.5ZM2.5 11.25a.75.75 0 0 0-1.5 0V13.5A1.5 1.5 0 0 0 2.5 15h2.25a.75.75 0 0 0 0-1.5H2.5v-2.25Z"/></svg>{T[lang].shareBtn}</>
                    )}
                  </button>
                  <button onClick={exportPng}
                    className="flex items-center gap-1.5 px-3 py-2 rounded-full text-xs font-medium border bg-[#21262d] border-[#30363d] text-[#8b949e] hover:border-[#3fb950] hover:text-[#3fb950] transition-all">
                    <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.97a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.779a.749.749 0 1 1 1.06-1.06l1.97 1.97Z"/></svg>
                    {T[lang].exportBtn}
                  </button>
                  <button onClick={()=>setCompareList([])} className="flex items-center gap-1.5 px-3 py-2 rounded-full text-xs font-medium border bg-[#21262d] border-[#30363d] text-[#8b949e] hover:border-red-700 hover:text-red-400 transition-all">{T[lang].compareClear}</button>
                </div>
              )}
            </div>
            {compareList.length===0 ? (
              <div className="bg-[#161b22] border border-[#30363d] rounded-xl p-8 text-center">
                <div className="text-[#6e7681] text-sm mb-3">{T[lang].compareEmpty}</div>
                <button onClick={()=>setView("cpu")} className="px-4 py-1.5 bg-[#21262d] hover:bg-[#30363d] text-[#c9d1d9] text-xs rounded-full transition-colors">
                  {T[lang].tabCpu} →
                </button>
              </div>
            ) : (()=>{
              const selCpus = compareList.map(m=>cpus.find(c=>c.model===m)).filter(Boolean);
              const rowDefs = [
                {i:0, numVal:null,          lower:false, val:c=>CPU_LAUNCH[c.model]?.released??'–'},
                {i:1, numVal:null,          lower:false, val:c=>CPU_LAUNCH[c.model]?.msrp??'–'},
                {i:2, numVal:null,          lower:false, val:c=>`${c.cores}/${c.threads}${c.coreDetail?" ("+c.coreDetail+")":""}`},
                {i:3, numVal:null,          lower:false, val:c=>c.base+"–"+c.boost+" GHz"},
                {i:4, numVal:c=>c.tdp,      lower:true,  val:c=>c.tdp+"W"},
                {i:5, numVal:null,          lower:false, val:c=>c.pcie},
                {i:6, numVal:null,          lower:false, val:c=>c.ram},
                {i:7, numVal:null,          lower:false, val:c=>c.priceUsed},
                {i:8, numVal:c=>c.cbR23s,  lower:false, val:c=>c.cbR23s??'–'},
                {i:9, numVal:c=>c.cbR23m,  lower:false, val:c=>c.cbR23m??'–'},
                {i:10,numVal:c=>c.cbR24s,  lower:false, val:c=>c.cbR24s??'–'},
                {i:11,numVal:c=>c.cbR24m,  lower:false, val:c=>c.cbR24m??'–'},
                {i:12,numVal:null,          lower:false, val:c=>LC[c.llmRating].label[lang]},
              ];
              return (
                <div ref={compareTableRef} className="bg-[#161b22]/60 backdrop-blur-sm border border-white/10 rounded-xl overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="border-b border-[#30363d]">
                          <th className="text-left px-3 py-3 text-[#6e7681] text-xs uppercase tracking-wider min-w-[110px] sticky left-0 bg-[#161b22] z-10">{T[lang].compareSpec}</th>
                          {selCpus.map(cpu=>{
                            const meta=PLATFORM_META[cpu.platform];
                            return (
                              <th key={cpu.model} className="px-3 pt-3 pb-2.5 text-left min-w-[155px] align-bottom">
                                <div className="flex items-end justify-between gap-1">
                                  <div className="flex flex-col gap-1 items-start">
                                    <span className={`inline-block rounded font-bold text-[9px] leading-none whitespace-nowrap px-[7px] py-1 ${meta.style}`}>{meta.label}</span>
                                    <div className="text-[#e6edf3] font-bold text-[12px] leading-snug">{cpu.model}</div>
                                  </div>
                                  <button onClick={()=>toggleCompare(cpu.model)} className="text-[#484f58] hover:text-red-400 text-xs shrink-0 mb-0.5 transition-colors">✕</button>
                                </div>
                              </th>
                            );
                          })}
                        </tr>
                      </thead>
                      <tbody>
                        {rowDefs.map(({i,numVal,lower,val})=>{
                          const nums = numVal ? selCpus.map(c=>numVal(c)).filter(v=>v!=null) : [];
                          const best = nums.length ? (lower?Math.min(...nums):Math.max(...nums)) : null;
                          return (
                            <tr key={i} className="border-b border-[#30363d] hover:bg-[#21262d]">
                              <td className="px-3 py-2.5 text-[#6e7681] text-xs font-semibold uppercase tracking-wider sticky left-0 bg-[#161b22]">{T[lang].compareRows[i]}</td>
                              {selCpus.map(cpu=>{
                                const n = numVal ? numVal(cpu) : null;
                                const isBest = best!==null && n===best;
                                return (
                                  <td key={cpu.model} className={"px-3 py-2.5 "+(isBest?"text-emerald-400 font-bold":"text-[#c9d1d9]")}>
                                    {val(cpu)}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className="px-3 py-2 border-t border-[#30363d] text-[10px] text-[#484f58] text-center">{T[lang].compareMax}</div>
                </div>
              );
            })()}
          </div>
        )}

        {/* Recommendations */}
        <div className="bg-[#161b22]/60 backdrop-blur-sm border border-white/10 rounded-xl p-4 mt-4">
          <div className="text-[#c9d1d9] font-semibold text-sm mb-2">{T[lang].recTitle}</div>
          <div className="space-y-1.5 text-xs text-[#8b949e]">
            {T[lang].recs.map(({i,l,c,r})=>(
              <div key={l} className="flex gap-2">
                <span className="shrink-0">{i}</span>
                <span className={`${c} font-medium whitespace-nowrap`}>{l}:</span>
                <span>{r}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="text-[10px] text-[#3d444d] mt-3 text-center">
          {T[lang].footer} · <span className="font-mono">{APP_VERSION}</span>
        </div>
        <div className="mt-1 text-center">
          <a href="https://github.com/krebs3r/local-llm-cpu-guide" target="_blank" rel="noopener noreferrer"
            className="inline-flex items-center gap-1.5 text-[10px] text-[#3d444d] hover:text-[#8b949e] transition-colors">
            <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            github.com/krebs3r/local-llm-cpu-guide
          </a>
        </div>
      </div>

      {/* Floating compare button */}
      {compareList.length >= 2 && view !== "compare" && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50">
          <button
            onClick={()=>setView("compare")}
            className="inline-flex items-center gap-2 px-5 py-2.5 bg-[#1f6feb]/75 backdrop-blur-md hover:bg-[#388bfd]/80 text-[#e6edf3] text-sm font-semibold rounded-full shadow-lg border border-white/20 transition-all">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8.75 1.75a.75.75 0 0 0-1.5 0v12.5a.75.75 0 0 0 1.5 0V1.75ZM1 3.75A.75.75 0 0 1 1.75 3H6v10H1.75A.75.75 0 0 1 1 12.25V3.75ZM10 3h4.25a.75.75 0 0 1 .75.75v8.5a.75.75 0 0 1-.75.75H10V3Z"/></svg>
            {T[lang].compareBtn(compareList.length)}
          </button>
        </div>
      )}
    </div>
  );
}

    root.render(<App />);
